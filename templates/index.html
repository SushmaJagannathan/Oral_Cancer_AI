<!DOCTYPE html>
<html>

<head>

<title>Oral Cancer AI Detection</title>

<style>

*{
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}


body{

    margin:0;
    min-height:100vh;
    background:
    linear-gradient(135deg,#071426,#102a43);

    color:white;
    display:flex;
    justify-content:center;
    align-items:center;

}


.container{

    width:90%;
    max-width:1100px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:35px;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.4);

}


.header{

    text-align:center;
    margin-bottom:30px;

}


.header h1{

    font-size:45px;
    margin:0;

    background:
    linear-gradient(90deg,#00eaff,#00ff88);

    -webkit-background-clip:text;
    color:transparent;

}


.header p{

    color:#cbd5e1;
    font-size:18px;

}



.upload-box{

    border:2px dashed #00eaff;

    padding:35px;

    border-radius:20px;

    text-align:center;

    transition:.3s;

}


.upload-box:hover{

    background:rgba(0,234,255,0.1);

}



input[type=file]{


    padding:15px;

    background:white;

    border-radius:10px;

    color:black;

}



button{


    margin-top:20px;

    padding:15px 45px;

    border:none;

    border-radius:30px;

    font-size:18px;

    cursor:pointer;

    background:
    linear-gradient(90deg,#00eaff,#00ff88);

    color:#002;

    font-weight:bold;

    transition:.3s;


}



button:hover{

    transform:scale(1.05);

}




.result-area{


    margin-top:30px;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;


}



.card{


    background:rgba(255,255,255,0.1);

    padding:25px;

    border-radius:20px;

    text-align:center;

}



.card h2{

    color:#00ffcc;

}



.images{


    margin-top:30px;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:25px;

}



.image-card{


    background:white;

    padding:20px;

    border-radius:20px;

    color:#111;

    text-align:center;

}



.image-card img{


    width:100%;

    max-height:400px;

    object-fit:contain;

    border-radius:15px;

}



.footer{

    margin-top:30px;

    text-align:center;

    color:#94a3b8;

}


@media(max-width:700px){

.images{

grid-template-columns:1fr;

}

}



</style>

</head>



<body>


<div class="container">



<div class="header">

<h1>🧬 Oral Cancer AI</h1>

<p>
Deep Learning Based Oral Cancer Detection System
</p>

</div>





<div class="upload-box">


<h2>Upload Oral Image</h2>


<input 
type="file"
id="image">


<br>


<button onclick="predict()">

🔍 Analyze Image

</button>


</div>





<div class="result-area">


<div class="card">

<h2>Prediction</h2>

<h3 id="result">
Waiting...
</h3>

</div>



<div class="card">

<h2>Confidence</h2>

<h3 id="confidence">
-
</h3>

</div>



<div class="card">

<h2>Risk Level</h2>

<h3 id="risk">
-
</h3>

</div>


</div>






<div class="images">


<div class="image-card">


<h2>🔥 Grad-CAM Explainability</h2>


<img id="grad">


</div>




<div class="image-card">


<h2>🎯 Score-CAM Explainability</h2>


<img id="score">


</div>


</div>








</div>






<script>


async function predict(){


let file=document
.getElementById("image")
.files[0];



let form=new FormData();


form.append(
"image",
file
);



let res=await fetch(
"/predict",
{
method:"POST",
body:form
}
);



let data=await res.json();




result.innerHTML=
"🧪 "
+data.prediction;



confidence.innerHTML=
data.confidence+"%";



risk.innerHTML=
data.risk;



grad.src=
data.gradcam+"?"+Date.now();



score.src=
data.scorecam+"?"+Date.now();


}



</script>



</body>

</html>
